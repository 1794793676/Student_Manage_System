<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员首页</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/admin/home}">学生选课管理系统</a>
    <nav class="nav-links">
        <a th:href="@{/admin/courses}">课程管理</a>
        <a th:href="@{/admin/selections}">选课记录</a>
        <a th:href="@{/logout}">退出登录</a>
    </nav>
</header>

<main class="page">
    <section class="page-heading">
        <p class="eyebrow">Admin Center</p>
        <h1>管理员首页</h1>
        <p>课程维护、选课记录查询和演示数据管理</p>
    </section>

    <section class="action-grid">
        <a class="action-tile" th:href="@{/admin/courses}">
            <strong>课程管理</strong>
            <span>添加、修改、删除课程并查看已选人数</span>
        </a>
        <a class="action-tile" th:href="@{/admin/selections}">
            <strong>选课记录</strong>
            <span>查看学生、课程、教师和选课时间</span>
        </a>
    </section>
</main>
</body>
</html>
